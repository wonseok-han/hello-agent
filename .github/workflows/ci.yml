name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # 소개 웹사이트는 데스크톱 앱과 배포 단위가 달라 별도로 검증한다.
  website:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      # rolldown/sharp 등 플랫폼별 네이티브 optional 바이너리는 한 OS에서 만든
      # lock에 아예 안 담긴다(npm/cli#4828) → 다른 OS 러너가 lock을 따르면 못 찾음.
      # lock을 지우고 새로 설치해 러너 OS(linux)용 바이너리를 신선하게 받는다.
      - run: rm -f package-lock.json && npm install --no-audit --no-fund

      - name: 웹사이트 빌드 + 렌더링 테스트
        run: npm test

      - name: 웹사이트 린트
        run: npm run lint

  # 프론트 빌드 + Rust 테스트 (macOS / Windows 동시)
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: 프론트엔드 빌드 (tsc + vite)
        run: pnpm build

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Rust 테스트
        run: cargo test --manifest-path src-tauri/Cargo.toml

      # 실제 인스톨러를 내려받아 격리 HOME에 무인 설치하는 E2E (네트워크 사용)
      # Windows는 일회용 러너라 레지스트리 PATH 반영까지 실제로 검증한다 (M0 가정 4)
      - name: 설치 파이프라인 격리 E2E
        run: cargo test --manifest-path src-tauri/Cargo.toml isolated_install -- --ignored --nocapture

  # Windows 번들 빌드 검증 — 로컬(맥)에서 못 하는 것을 CI가 대신한다 (M0 가정 4)
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Tauri Windows 빌드 (NSIS 인스톨러)
        run: pnpm tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # macOS 설치 파일(.dmg) 빌드 — Actions에서 내려받아 설치할 수 있게 한다.
  # 서명 없이 빌드하므로 다운로드 시 "확인되지 않은 개발자" 경고가 뜬다(정상).
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Tauri macOS 빌드 (.dmg + .app)
        run: pnpm tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
